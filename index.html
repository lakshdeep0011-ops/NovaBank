<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Demo Bank</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
background:linear-gradient(135deg,#081225,#0f3460,#1f6feb);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.bg{
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,0.08);
border-radius:50%;
filter:blur(100px);
animation:move 8s infinite alternate;
}

@keyframes move{
from{transform:translate(-150px,-100px);}
to{transform:translate(150px,100px);}
}

.card{
position:relative;
width:350px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 0 30px rgba(0,0,0,0.4);
animation:fade 0.7s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.12);
color:white;
font-size:15px;
}

input::placeholder{
color:#ddd;
}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:14px;
background:#2f7df6;
color:white;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.hidden{
display:none;
}

.balance{
font-size:40px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.history{
margin-top:15px;
padding:10px;
border-radius:14px;
background:rgba(0,0,0,0.2);
max-height:140px;
overflow:auto;
}

.cardbox{
background:linear-gradient(135deg,#2f7df6,#5ba8ff);
padding:18px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.small{
opacity:0.8;
margin-top:8px;
font-size:14px;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- LOGIN PAGE -->

<div class="card" id="loginPage">

<div class="logo">Nova Demo Bank</div>

<input id="loginUser" placeholder="Username">

<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<button onclick="showRegister()">
Create Account
</button>

</div>

<!-- REGISTER PAGE -->

<div class="card hidden" id="registerPage">

<div class="logo">Create Account</div>

<input id="newUser" placeholder="Username">

<input id="newPass" type="password" placeholder="Password">

<button onclick="createAccount()">
Create Account
</button>

<button onclick="backLogin()">
Back
</button>

</div>

<!-- DASHBOARD -->

<div class="card hidden" id="dashboard">

<div class="topbar">
<h2>Dashboard</h2>

<button style="width:90px;padding:10px;" onclick="logout()">
Logout
</button>
</div>

<div class="cardbox">

<h3>Nova Demo Bank</h3>

<div class="small">
Account Number:
<span id="accNum"></span>
</div>

<div class="balance">
₹<span id="money">0</span>
</div>

</div>

<input id="depositAmount" type="number" placeholder="Deposit Amount">

<button onclick="deposit()">
Deposit Money
</button>

<input id="transferUser" placeholder="Receiver Username">

<input id="transferAmount" type="number" placeholder="Transfer Amount">

<button onclick="transfer()">
Transfer Money
</button>

<div class="history" id="history">
<h3>Transaction History</h3>
</div>

</div>

<script>

let balance=0;

let accountNumber=Math.floor(Math.random()*90000000)+10000000;

function showRegister(){

document.getElementById("loginPage").classList.add("hidden");

document.getElementById("registerPage").classList.remove("hidden");

}

function backLogin(){

document.getElementById("registerPage").classList.add("hidden");

document.getElementById("loginPage").classList.remove("hidden");

}

function createAccount(){

let user=document.getElementById("newUser").value;

let pass=document.getElementById("newPass").value;

if(user==="" || pass===""){
alert("Fill all fields");
return;
}

localStorage.setItem("user",user);

localStorage.setItem("pass",pass);

alert("Account Created Successfully");

backLogin();

}

function login(){

let user=document.getElementById("loginUser").value;

let pass=document.getElementById("loginPass").value;

if(user==="admin" && pass==="admin123"){
alert("Admin Login Success");
return;
}

if(
user===localStorage.getItem("user")
&&
pass===localStorage.getItem("pass")
){

document.getElementById("loginPage").classList.add("hidden");

document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("accNum").innerHTML=accountNumber;

}
else{

alert("Wrong Username or Password");

}

}

function deposit(){

let amt=Number(document.getElementById("depositAmount").value);

if(amt<=0){
alert("Enter valid amount");
return;
}

balance+=amt;

document.getElementById("money").innerHTML=balance;

addHistory("Deposited ₹"+amt);

document.getElementById("depositAmount").value="";

}

function transfer(){

let user=document.getElementById("transferUser").value;

let amt=Number(document.getElementById("transferAmount").value);

if(user===""){
alert("Enter receiver username");
return;
}

if(amt<=0){
alert("Enter valid amount");
return;
}

if(amt>balance){
alert("Insufficient Balance");
return;
}

balance-=amt;

document.getElementById("money").innerHTML=balance;

addHistory("Transferred ₹"+amt+" to "+user);

alert("Transfer Successful");

document.getElementById("transferUser").value="";
document.getElementById("transferAmount").value="";

}

function addHistory(text){

document.getElementById("history").innerHTML +=
"<p style='margin-top:10px;'>"+text+"</p>";

}

function logout(){

document.getElementById("dashboard").classList.add("hidden");

document.getElementById("loginPage").classList.remove("hidden");

}

</script>

</body>
</html>
